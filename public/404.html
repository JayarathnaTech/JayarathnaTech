<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>JayarathnaTech</title>
    <script>
      // GitHub Pages SPA redirect trick.
      // Captures the full path and redirects to index.html with the path
      // stored as a query string so the SPA can restore it on load.
      var segmentCount = 1; // 1 = one subdirectory deep (/JayarathnaTech/)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
